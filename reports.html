<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/reports.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<div class="layout">

    <aside class="sidebar">

        <div>

            <img src="images/Logo.png" class="logo">

            <h2 class="logo-text">Smart IT</h2>

            <nav>

                <a href="home.html">
                    <i class="fa-solid fa-house"></i>
                    Dashboard
                </a>

                <a href="assets.html">
                    <i class="fa-solid fa-computer"></i>
                    Assets
                </a>

                <a href="tickets.html">
                    <i class="fa-solid fa-ticket"></i>
                    Tickets
                </a>

                <a href="reports.html" class="active">
                    <i class="fa-solid fa-chart-column"></i>
                    Reports
                </a>

            </nav>

        </div>

        <a href="index.html" class="logout-btn">
            <i class="fa-solid fa-right-from-bracket"></i>
            Logout
        </a>

    </aside>


    <main class="main-content">

        <h1>Reports Dashboard</h1>

        <div class="cards">

            <div class="card">
                <h3>Total Assets</h3>
                <span id="reportAssets">0</span>
            </div>

            <div class="card">
                <h3>Open Tickets</h3>
                <span id="reportOpen">0</span>
            </div>

            <div class="card">
                <h3>Closed Tickets</h3>
                <span id="reportClosed">0</span>
            </div>

            <div class="card">
                <h3>In Progress</h3>
                <span id="reportProgress">0</span>
            </div>

        </div>


        <div class="chart-card">

            <h2>Assets By Status</h2>

            <div class="chart-container">

                <canvas id="assetsChart"></canvas>

            </div>

        </div>


        <div class="chart-card">

            <h2>Tickets Priority</h2>

            <div class="chart-container">

                <canvas id="ticketsChart"></canvas>

            </div>

        </div>

    </main>

</div>

<footer class="footer">

    © 2026 Smart IT Asset & Ticket Management System |
    Developed by Areej |
    All Rights Reserved.

</footer>

<script src="js/reports.js"></script>

</body>
</html>
